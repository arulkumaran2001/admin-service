apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
        - name: admin-service
          image: admin-service:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 9007

---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: app1
spec:
  selector:
    app: admin-service
  ports:
    - port: 9007
      targetPort: 9007
  type: NodePort