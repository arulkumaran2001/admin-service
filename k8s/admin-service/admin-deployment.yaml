apiVersion: apps/v1
kind: Deployment

metadata:
  name: admin-service
  namespace: dev

spec:
  replicas: 1

  selector:
    matchLabels:
      app: admin-service

  template:
    metadata:
      labels:
        app: admin-service

    spec:
      containers:
        - name: admin-service

          image: admin-service:v1

          imagePullPolicy: Never

          ports:
            - containerPort: 9007