spring.application.name=admin-service
server.port=9007
server.servlet.context-path=/adminservice

# Database connection (PostgreSQL)
#spring.datasource.url=jdbc:postgresql://localhost:3307/postgres
#spring.datasource.url=jdbc:postgresql://host.docker.internal:3307/postgres
#spring.datasource.url=jdbc:postgresql://postgres-db:5432/postgres
#spring.datasource.url=jdbc:postgresql://postgres-service.database.svc.cluster.local:5432/postgres
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:3307/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:2001}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.properties.hibernate.default_schema=Employee_app
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true